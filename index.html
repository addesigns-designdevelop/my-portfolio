<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adesewa | Portfolio & Resume</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #1a1a1b; 
            font-family: sans-serif;
        }
        .header {
            height: 60px;
            background-color: #1a1a1b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #d4af37;
        }
        h1 { color: #d4af37; font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        .pdf-container {
            height: calc(100% - 60px);
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ADELEKE ADESEWA • PORTFOLIO</h1>
    </div>

    <div class="pdf-container">
        <iframe src="portfolio.pdf#toolbar=0&navpanes=0&scrollbar=0">
            <p>Your browser does not support inline PDFs. 
               <a href="portfolio.pdf">Click here to view the PDF.</a>
            </p>
        </iframe>
    </div>
</body>
</html>
