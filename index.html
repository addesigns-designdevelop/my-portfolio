<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adesewa | Portfolio & Resume</title>
    <style>
        body { 
            background-color: #1a1a1b; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        h1 { 
            color: #d4af37; 
            font-size: 2.5rem;
            margin-bottom: 5px; 
            letter-spacing: 2px;
        }
        p { 
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 30px;
        }
        .btn { 
            padding: 15px 35px; 
            background-color: #d4af37; 
            color: #1a1a1b; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { 
            background-color: #ffffff; 
            transform: translateY(-3px);
        }
        .code-snippet {
            margin-top: 40px;
            font-family: 'Courier New', Courier, monospace;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
