<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adesewa | Portfolio</title>
    <style>
        body { 
            background-color: #1a1a1b; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header { 
            width: 100%; padding: 20px 0; text-align: center; 
            border-bottom: 1px solid #d4af37; 
            position: sticky; top: 0; background: #1a1a1b; z-index: 10; 
        }
        h1 { color: #d4af37; font-size: 1.2rem; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .portfolio-container { width: 100%; max-width: 900px; padding: 10px; box-sizing: border-box; }
        
        .portfolio-page { 
            width: 100%; margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }
        img { width: 100%; height: auto; display: block; }

        .footer { padding: 60px 20px; text-align: center; background: #111; width: 100%; box-sizing: border-box; }
        .footer p { color: #888; margin-bottom: 20px; }
        
        .btn-download { 
            padding: 18px 40px; 
            background: #d4af37; 
            color: #1a1a1b; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 4px; 
            display: inline-block;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-download:hover { background: #ffffff; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="header">
        <h1>ADELEKE ADESEWA • PORTFOLIO</h1>
    </div>

    <div class="portfolio-container">
        <img src="page1.jpg" class="portfolio-page" alt="Cover Page">
        <img src="page2.jpg" class="portfolio-page" alt="Project 1">
        <img src="page3.jpg" class="portfolio-page" alt="Project 2">
        <img src="page4.jpg" class="portfolio-page" alt="Project 3">
        <img src="page5.jpg" class="portfolio-page" alt="Project 4">
        <img src="page6.jpg" class="portfolio-page" alt="Project 5">
        <img src="page7.jpg" class="portfolio-page" alt="Project 6">
        <img src="page8.jpg" class="portfolio-page" alt="Contact">
    </div>

    <div class="footer">
        <p>Need a copy for your records?</p>
        <a href="portfolio.pdf" class="btn-download" target="_blank">Download PDF Version</a>
    </div>
</body>
</html>
